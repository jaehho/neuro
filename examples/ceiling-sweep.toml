# Ceiling sweep: r_pre × r_target probing the 1/τ_ref refractory bound.
# Linear-gated rule (M = R = target − r_post). Wide log-spaced ranges so
# the heatmap shows a clear horizontal saturation band at r_target ≈ 333 Hz
# (= 1/τ_ref with τ_ref = 3 ms) where the post can't fire faster.
#
# Run on mililab and pull back:
#   make sweep-remote ARGS='--config examples/ceiling-sweep.toml'
# Or locally:
#   uv run neuro sweep run --config examples/ceiling-sweep.toml

[sweep]
x_var = "r_pre"
x_min = 5.0
x_max = 1500.0
n_x = 14
x_log = true               # geomspace; high resolution near low rates

y_var = "r_target"
y_min = 5.0
y_max = 1000.0
n_y = 14
y_log = true               # crosses 1/τ_ref ≈ 333 Hz

[convergence]
# A cell is converged when r_post is BOTH flat AND on target — flat
# alone gave false positives (slow weight growth → "stable enough" early stop).
window = 8.0
rel_tol = 0.02
abs_tol = 0.5
consecutive = 5
min_t = 20.0
check_interval = 1.0
target_abs_tol = 2.0       # On-target tolerance (Hz). Required to call it converged.
target_rel_tol = 0.05
target_fixed = 0.0         # 0 → infer target from r_target axis

[weight_convergence]
# Weight stability — caught the failure mode where r_post was locally flat
# but w was still climbing toward saturation.
enabled = true
window = 8.0
rel_tol = 0.0
abs_tol = 0.02
consecutive = 5
min_t = 20.0
check_interval = 1.0

[runner]
procs = 0                  # 0 → CPU count − 2
chunk_rows = 100000

[base]
# Frozen Params for every cell. The two sweep axes (r_pre, r_target)
# replace the matching fields here automatically.

T = 60.0
dt = 0.0001
seed = 1
method = "rk4"
n_pre = 1
record_every = 0.001

r_pre_rates = 20.0         # placeholder — overridden by x axis
poisson = true

# Linear-gated three-factor rule
neuromod_type = "gated"
reward_signal = "target_rate_linear"

# Window rate estimator stays steady when post fires fast
rate_mode = "window"
rate_window = 0.5

# Higher initial weight encourages saturation
w0 = 5.0
wmax = 10.0
eta_plus = 0.0001
eta_minus = 0.0001

# Optional: add bias current to push past ~333 Hz on its own
# I_ext = 0.0

# Baseline single run: 1 pre → 1 post, target-rate reward, covariance neuromod.
# This is the canonical 1-presynaptic Fetz-style demo: a single neuron
# learning to track a fixed target firing rate via three-factor STDP.
#
# Run:  uv run neuro run --config examples/baseline-run.toml

# ── Simulation ──
T = 60.0
dt = 0.0001
seed = 1
method = "rk4"
n_pre = 1
record_every = 0.001

# ── Pre input ──
r_pre_rates = 20.0
poisson = true

# ── Rate estimation ──
rate_mode = "exp"
rate_window = 0.5
tau_r = 0.5

# ── Neuromod / reward ──
neuromod_type = "covariance"
reward_signal = "target_rate"
target_func = "fixed"
r_target = 10.0
tau_Rbar = 5.0

# ── Weights ──
w0 = 2.0
wmax = 10.0
eta_plus = 0.0001
eta_minus = 0.0001

[runner]
plot = true                 # opens the zoom-adaptive viewer when finished
host = "127.0.0.1"
port = 8050
max_plot_points = 40000
